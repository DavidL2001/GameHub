<!DOCTYPE html>
<html lang="en">
<head>

    <title>GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body>
  <div id="navbar"></div>

  <main class="leaderboard-container">
    <h1>Leaderboard</h1>
    
    <!-- Välj spel -->
    <section class="game-selector">
      <label for="gameSelect">Välj spel:</label>
      <select id="gameSelect">
        <option value="1">Tic Tac Toe</option>
        <!-- Fler spel senare -->
      </select>
    </section>

    <!-- Leaderboard-tabell -->
    <section class="leaderboard-section">
      <table id="leaderboardTable">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player Name</th>
            <th>Score</th>
          </tr>
        </thead>
        <tbody>
          <!-- JavaScript fyller på rader här -->
        </tbody>
      </table>
    </section>
  </main>

            <p><a class="footer-link" href="#" style="text-decoration: none;">Documentation</a></p>
